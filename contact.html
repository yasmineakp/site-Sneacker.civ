<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="contact.css">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark px-5">
    <a class="navbar-brand text-white" href="#">Sneakers</a>

    <div class="ms-auto">
        <a href="index.html" class="mx-3 text-white text-decoration-none">Accueil</a>
        <a href="produits.html" class="mx-3 text-white text-decoration-none">Produits</a>
        <a href="boutiques.html" class="mx-3 text-white text-decoration-none">Boutiques</a>
        <a href="contact.html" class="mx-3 text-white text-decoration-none active">Contact</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero-contact">
    <h1 class="hero-text">CONTACT</h1>
    <p class="hero-sub">Nous sommes là pour vous aider</p>
</section>

<!-- CONTACT SECTION -->
<section class="container py-5">
    <div class="row g-5 align-items-center">

        <!-- FORMULAIRE -->
        <div class="col-md-6">
            <div class="contact-card">
                <h2>Envoyez-nous un message</h2>

                <form>
                    <div class="mb-3">
                        <label class="form-label">Nom</label>
                        <input type="text" class="form-control" placeholder="Votre nom">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" placeholder="Votre email">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Message</label>
                        <textarea class="form-control" rows="5" placeholder="Votre message"></textarea>
                    </div>

                    <button type="submit" class="btn-contact">Envoyer</button>
                </form>
            </div>
        </div>

        <!-- INFO + MAP -->
        <div class="col-md-6">
            <div class="info-card">
                <h3>Nos informations</h3>
                <p>📍 Abidjan, Côte d’Ivoire</p>
                <p>📞 +225 07 08 20 20 30</p>
                <p>📧 contact@sneakersci.com</p>

                <div class="map mt-4">
                    <iframe
                        src="https://www.google.com/maps?q=abidjan&output=embed"
                        allowfullscreen=""
                        loading="lazy">
                    </iframe>
                </div>
            </div>
        </div>

    </div>
</section>

<!-- FOOTER -->
<footer class="text-center py-4">
    <p>© 2026 Sneakers CI</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
